## 🚀 Descripción del Feature

Una descripción clara y concisa de la funcionalidad que propones.

## 🎯 Problema que Resuelve

**¿Este feature está relacionado con un problema? Descríbelo.**
Ej: "Siempre es frustrante cuando [...]"

## 💡 Solución Propuesta

Descripción clara y concisa de lo que quieres que suceda.

**Ejemplo de uso**:
```python
# Código de ejemplo mostrando cómo se usaría el feature
from external_skills.nuevo_modulo import nueva_funcion

resultado = nueva_funcion(parametros)
```

## 🔄 Alternativas Consideradas

Descripción de soluciones alternativas o features que has considerado.

## 📊 Impacto

**¿A quién beneficia este feature?**
- [ ] Investigadores
- [ ] Estudiantes
- [ ] Desarrolladores de skills
- [ ] Mantenedores del proyecto

**¿Qué tan crítico es?**
- [ ] Nice to have
- [ ] Importante
- [ ] Crítico para mi trabajo

## 🛠️ Implementación Sugerida

Si tienes ideas sobre cómo implementarlo técnicamente, compártelas aquí.

## 📚 Contexto Adicional

Cualquier otra información, screenshots, papers científicos, o referencias relevantes.

## ✔️ Checklist

- [ ] He buscado en issues existentes y este feature no ha sido propuesto
- [ ] He considerado alternativas
- [ ] He proporcionado un ejemplo de uso claro
- [ ] Estoy dispuesto a contribuir con una PR para implementarlo
